<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
/* ===== FIREBASE ===== */
const firebaseConfig = {
    apiKey: "AIzaSyAFx9KTvVic2jxrT28Zx9wLIfBABISXnTk",
    authDomain: "avalon-6951b.firebaseapp.com",
    databaseURL: "https://avalon-6951b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "avalon-6951b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== GIỮ NGUYÊN ===== */
let myID = 'p_' + Math.random().toString(36).substr(2, 5);
let myName = '', roomID = '', state = null;

/* ===== CONFIG GIỮ NGUYÊN ===== */
const CONFIG = {
    7: { q: [2,3,3,4,4], r: ['Assassin','Morgana','Mordred','Merlin','Percival','Villager','Villager'] },
    8: { q: [3,4,4,5,5], r: ['Assassin','Morgana','Mordred','Merlin','Percival','Villager','Villager','Villager'] },
    9: { q: [3,4,4,5,5], r: ['Assassin','Morgana','Mordred','Merlin','Percival','Villager','Villager','Villager','Villager'] },
    10:{ q: [3,4,4,5,5], r: ['Assassin','Morgana','Mordred','Merlin','Percival','Villager','Villager','Villager','Villager','Villager'] }
};

/* ===== SYNC (CHỈ THAY CHỖ NÀY) ===== */
function sync(data) {
    db.ref('rooms/' + roomID + '/state').set(JSON.stringify(data));
}

/* ===== CLEANUP ===== */
function cleanup() {
    db.ref('rooms/' + roomID).remove();
}

/* ===== JOIN GAME (CODE 1) ===== */
function joinGame() {
    roomID = document.getElementById('in-room').value.trim();
    myName = document.getElementById('in-name').value.trim();
    if(!roomID || !myName) return alert("Vui lòng điền đủ!");

    const pRef = db.ref('rooms/' + roomID + '/players/' + myID);
    pRef.set({ id: myID, name: myName, joinedAt: Date.now() });
    pRef.onDisconnect().remove();

    document.getElementById('view-login').classList.add('hidden');
    document.getElementById('view-lobby').classList.remove('hidden');
    document.getElementById('room-title').innerText = "Phòng: " + roomID;

    db.ref('rooms/' + roomID + '/players').on('value', snap => {
        let players = [];
        snap.forEach(c => players.push(c.val()));
        players.sort((a,b)=>a.joinedAt - b.joinedAt);

        document.getElementById('lobby-list').innerHTML =
            players.map((p,i)=>`• <b>${p.name}</b> ${i===0?'(HOST)':''}`).join('<br>');

        if(players.length >= 7 && players[0].id === myID){
            document.getElementById('btn-start').classList.remove('hidden');
        }
    });

    db.ref('rooms/' + roomID + '/state').on('value', snap => {
        if(snap.val()) updateUI(JSON.parse(snap.val()));
    });
}

/* ===== START GAME (GIỮ NGUYÊN) ===== */
function startGame() {
    db.ref('rooms/' + roomID + '/players').once('value', snap => {
        const ps = []; snap.forEach(c => ps.push(c.val()));
        const n = ps.length;
        const c = CONFIG[n] || CONFIG[10];

        let rolesPool = [...c.r];
        if (n > 10) for (let i = 10; i < n; i++) rolesPool.push('Villager');

        const roles = rolesPool.sort(() => Math.random() - 0.5);
        const order = ps.map(p => p.id).sort(() => Math.random() - 0.5);
        const kIdx = Math.floor(Math.random() * n);

        sync({
            names: ps.reduce((a,p)=>({...a,[p.id]:p.name}),{}),
            order,
            roles: order.reduce((a,id,i)=>({...a,[id]:roles[i]}),{}),
            kingIdx: kIdx,
            ladyIdx: (kIdx - 1 + n) % n,
            firstLady: (kIdx - 1 + n) % n,
            round: 1,
            points: [],
            failedVotes: 0,
            phase: 'SELECT',
            team: [],
            votes: {},
            missions: {},
            showVotes: false
        });
    });
}

</script>
