<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVALON BY NHAT - Lobby</title>
    <!-- Import Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: var(--primary); letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px; }
        
        #login-section, #lobby-section { display: none; }
        #login-section.active, #lobby-section.active { display: block; }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            margin-bottom: 15px;
            outline: none;
        }
        button {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #c0392b; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }

        .player-list {
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
            max-height: 250px;
            overflow-y: auto;
        }
        .player-item {
            padding: 8px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }
        .host-badge {
            background: #f1c40f;
            color: black;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status { font-style: italic; font-size: 0.9rem; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AVALON</h1>
        <div class="subtitle">BY NHAT</div>

        <!-- Màn hình nhập tên -->
        <div id="login-section" class="active">
            <input type="text" id="username" placeholder="Nhập tên của bạn..." maxlength="15">
            <br>
            <button onclick="joinGame()">VÀO PHÒNG</button>
        </div>

        <!-- Màn hình sảnh chờ -->
        <div id="lobby-section">
            <div class="status" id="player-count">Đang chờ người chơi (0/7)...</div>
            <div class="player-list" id="player-list">
                <!-- Danh sách người chơi sẽ hiện ở đây -->
            </div>
            <div id="host-controls" style="display: none;">
                <p style="font-size: 0.8rem;">Bạn là Host (Nhat)</p>
                <button id="start-btn" onclick="startGame()" disabled>BẮT ĐẦU GAME</button>
            </div>
            <p id="wait-msg" style="display: none; font-size: 0.8rem;">Đang đợi Nhat bắt đầu...</p>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH FIREBASE CỦA BẠN TẠI ĐÂY ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        // -----------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myName = "";

        function joinGame() {
            const nameInput = document.getElementById('username').value.trim();
            if (!nameInput) return alert("Vui lòng nhập tên!");
            
            myName = nameInput;
            const playerRef = db.ref('players/' + myName);

            // Thêm người chơi vào database
            playerRef.set({
                name: myName,
                isHost: (myName.toLowerCase() === 'nhat'),
                joinedAt: Date.now()
            });

            // Khi tắt trình duyệt thì tự xóa tên khỏi danh sách
            playerRef.onDisconnect().remove();

            document.getElementById('login-section').classList.remove('active');
            document.getElementById('lobby-section').classList.add('active');
            
            checkRole();
            listenToPlayers();
            listenToGameStart();
        }

        function checkRole() {
            if (myName.toLowerCase() === 'nhat') {
                document.getElementById('host-controls').style.display = 'block';
            } else {
                document.getElementById('wait-msg').style.display = 'block';
            }
        }

        function listenToPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const playerListDiv = document.getElementById('player-list');
                const startBtn = document.getElementById('start-btn');
                playerListDiv.innerHTML = "";
                
                let count = 0;
                for (let id in players) {
                    count++;
                    const p = players[id];
                    playerListDiv.innerHTML += `
                        <div class="player-item">
                            <span>${p.name} ${p.isHost ? '<span class="host-badge">HOST</span>' : ''}</span>
                            <span style="color: #2ecc71">●</span>
                        </div>
                    `;
                }

                document.getElementById('player-count').innerText = `Người chơi: (${count}/7)`;
                
                // Điều kiện để Host nhấn nút Start (7 người trở lên)
                if (count >= 7) {
                    startBtn.disabled = false;
                    document.getElementById('player-count').style.color = "#2ecc71";
                } else {
                    startBtn.disabled = true;
                    document.getElementById('player-count').style.color = "#f1c40f";
                }
            });
        }

        function startGame() {
            db.ref('gameStatus').set({
                started: true,
                startTime: Date.now()
            });
        }

        function listenToGameStart() {
            db.ref('gameStatus/started').on('value', (snapshot) => {
                if (snapshot.val() === true) {
                    alert("GAME AVALON BẮT ĐẦU! Chúc mọi người chơi vui vẻ.");
                    // Reset trạng thái sau khi hiện thông báo
                    if (myName.toLowerCase() === 'nhat') {
                        db.ref('gameStatus').set({ started: false });
                    }
                }
            });
        }
    </script>
</body>
</html>
